    text: >
      A wide shot shows an elderly man in a suit and an older woman in a floral
      cardigan standing side-by-side in a living room, looking toward a young boy
      who stands facing them. The room is brightly lit with warm ambient lighting.
    duration_seconds: 5.0

  - shot_id: 2
    text: >
      A close-up of the elderly man, wearing glasses and a dark suit, as he speaks
      with a concerned expression. His face shows deep wrinkles and gray hair.
    duration_seconds: 5.0

  - shot_id: 3
    text: >
      A close-up of the woman, with her silver hair neatly styled, looking at the
      man with a serious and attentive look. She wears a floral cardigan over a
      light blouse.
    duration_seconds: 5.0

  - shot_id: 4
    text: >
      The camera cuts back to the elderly couple standing together in the living room,
      looking at each other while they talk. The man in the dark suit and the woman
      in the floral cardigan exchange meaningful glances.
    duration_seconds: 5.0

  - shot_id: 5
    text: >
      A medium wide shot shows the elderly couple and the young boy, capturing the
      spatial arrangement of the room and the focus of the three individuals.
      The boy watches the adults with an intent expression.
