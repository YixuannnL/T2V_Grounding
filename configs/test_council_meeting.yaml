global_caption: >
  The video features a series of close-up shots of different men in traditional
  or historical attire, suggesting a serious conversation or meeting in a royal
  court or ancient council chamber. The atmosphere is tense and contemplative.

shots:
  - shot_id: 1
    text: >
      A close-up of a man with a grey beard and a decorative silver headpiece,
      speaking with authority. He wears ornate traditional robes with intricate
      gold embroidery. His expression is stern and commanding.
    duration_seconds: 5.0

  - shot_id: 2
    text: >
      A close-up in profile of a man wearing a dark helmet and armor, listening
      attentively. The helmet has a distinctive angular design. He remains still,
      his gaze fixed ahead as if absorbing important information.
    duration_seconds: 5.0

  - shot_id: 3
    text: >
      A close-up focuses on an aged hand resting on a patterned surface,
      possibly a carved wooden armrest or ornate table. The fingers are adorned
      with rings bearing ancient symbols.
    duration_seconds: 3.0

  - shot_id: 4
    text: >
      A close-up of an elderly man with long white hair and a flowing white beard,
      looking downwards in deep contemplation. His face shows wisdom and concern,
      with wrinkles etched by years of experience.
    duration_seconds: 5.0

  - shot_id: 5
    text: >
      The man in the dark helmet and armor is now seen speaking, looking slightly
      off-camera. His jaw is set with determination as he delivers his words.
      The armor gleams faintly in the ambient light.
    duration_seconds: 5.0

  - shot_id: 6
    text: >
      The first man with the grey beard and silver headpiece looks downwards,
      appearing serious and thoughtful. He seems to be weighing a difficult decision,
      his earlier authority now tempered with reflection.
    duration_seconds: 5.0
