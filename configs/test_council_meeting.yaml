# test_council_meeting: 多角色 · 6镜头 · 古代议会/朝堂对话场景
# 测试目标:
#   Shot 1 → T2V (close-up)，建立 GreyBeard 外观（银色头饰老者）
#   Shot 2 → T2V (profile close-up)，建立 Armored 外观（盔甲武士）
#          ⚠️ profile 侧面可能 id_confidence 低，测试 Frontal-Aware 策略
#   Shot 3 → T2V (close-up)，手部特写，测试 object grounding
#   Shot 4 → T2V (close-up)，建立 WhiteBeard 外观（白发老者）
#   Shot 5 → Phantom (close-up)，Armored 说话，测试 profile 参考
#   Shot 6 → Phantom (close-up)，GreyBeard 复现，测试跨镜头一致性
# 难点:
#   - 多角色（3个人物），需精准匹配各自参考图
#   - Shot 2/5 为 profile 侧面，测试 id_confidence < 0.3 时的 Appearance Context 回退
#   - Shot 3 为手部特写，测试非人物实体的 grounding
